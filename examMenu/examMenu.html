<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../mainMenu/mainMenu.css">
    <link rel="stylesheet" href="examMenu.css">
    <title>Exam - Morse Code</title>
</head>
<body>
    <nav class="main-menu">
        <div class="menu-container">
            <h1 class="menu-title">Exam</h1>
            <div class="menu-items">
                <a id="startExamLink" href="../examSession/examSession.html"><button class="menu-button">Start</button></a>
                <div class="number-selector">
                    <button id="decreaseBtn" class="arrow-btn">◀</button>
                    <span id="numberValue">10</span>
                    <button id="increaseBtn" class="arrow-btn">▶</button>
                </div>
                <div class="exam-question-type-selector">
                    <label class="radio-button-label">
                        <input type="radio" name="questionType" value="encode" checked>
                        <span>Encode</span>
                    </label>
                    <label class="radio-button-label">
                        <input type="radio" name="questionType" value="decode">
                        <span>Decode</span>
                    </label>
                </div>
                <div class="exam-answer-type-selector">
                    <label class="radio-button-label">
                        <input type="radio" name="examType" value="quiz" checked>
                        <span>Quiz</span>
                    </label>
                    <label class="radio-button-label">
                        <input type="radio" name="examType" value="type">
                        <span>Type</span>
                    </label>
                </div>
                <a href="../index.html"><button class="menu-button">Back</button></a>
            </div>
        </div>
    </nav>
    <script src="../mainMenu/mainMenu.js"></script>
    <script src="examMenu.js"></script>
</body>
</html>
