<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Learn</title>
    <meta http-equiv="refresh" content="0; url=learn/learn.html">
    <script>
        const targetUrl = new URL("learn/learn.html", window.location.href);
        targetUrl.search = window.location.search;
        targetUrl.hash = window.location.hash;
        window.location.replace(targetUrl);
    </script>
</head>
<body>
    <p>Redirecting to the Learn page. If nothing happens, <a href="learn/learn.html">open it here</a>.</p>
</body>
</html>
